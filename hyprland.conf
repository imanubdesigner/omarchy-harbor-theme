# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

general {
    col.active_border = rgba(253631ee) 
    col.inactive_border = rgb(858f8b)
    gaps_in = 4
    gaps_out = 5
    border_size = 2
}

group {
    col.border_active = rgba(253631ee)
    col.border_inactive = rgb(858f8b)

    groupbar {
        col.active = rgba(25363199)
        col.inactive = rgba(858f8b88)
        text_color = rgb(d08770)
        text_color_inactive = rgba(4a8c99ee)
    }
}

decoration {
    rounding = 2
    rounding_power = 3
      shadow {
      enabled = yes
      render_power = 8
      range = 16
      color = rgba(0, 0, 0, 0.3)
    }
}
